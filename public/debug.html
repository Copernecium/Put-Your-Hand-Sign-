<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Console - Hand Pose Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page debug-page">
        <div class="header-bar">
            <a href="/" class="back-button">← Home</a>
            <h1>Debug Console</h1>
        </div>

        <div class="debug-content">
            <div class="debug-section">
                <h2>Game Control</h2>
                <div class="control-box">
                    <button id="startGameBtn" class="btn btn-primary">Start Game (Countdown)</button>
                    <button id="resetGameBtn" class="btn btn-danger">Reset Game</button>
                </div>
            </div>

            <div class="debug-section">
                <h2>Performance Monitoring</h2>
                <div class="state-display">
                    <div class="state-row">
                        <label>Debug Refresh Rate:</label>
                        <span id="refreshRate">0 Hz</span>
                    </div>
                    <div class="state-row">
                        <label>Server Sending Rate (Polling):</label>
                        <span id="sendingRate">0 Hz</span>
                    </div>
                    <div class="state-row">
                        <label>Player 1 Received Rate:</label>
                        <span id="p1Rate">0 msg/s</span>
                    </div>
                    <div class="state-row">
                        <label>Player 2 Received Rate:</label>
                        <span id="p2Rate">0 msg/s</span>
                    </div>
                    <div class="state-row">
                        <label>Player 1 Inference Time:</label>
                        <span id="p1Inference">0 ms</span>
                    </div>
                    <div class="state-row">
                        <label>Player 2 Inference Time:</label>
                        <span id="p2Inference">0 ms</span>
                    </div>
                </div>
            </div>

            <div class="debug-section">
                <h2>Timer Control</h2>
                <div class="timer-control">
                    <div class="input-group">
                        <label>Set Game Duration (seconds):</label>
                        <input type="number" id="timerInput" min="5" max="300" value="30">
                        <button id="setTimerBtn" class="btn">Set</button>
                    </div>
                </div>
            </div>

            <div class="debug-section">
                <h2>Player Ready Status</h2>
                <div class="player-control">
                    <div class="player-control-box player1-control">
                        <h3>Player 1</h3>
                        <div id="player1ReadyStatus" class="status-badge">Not Ready</div>
                        <div class="button-group">
                            <button id="player1ReadyBtn" class="btn btn-success">Set Ready</button>
                            <button id="player1UnreadyBtn" class="btn btn-danger">Set Not Ready</button>
                        </div>
                    </div>

                    <div class="player-control-box player2-control">
                        <h3>Player 2</h3>
                        <div id="player2ReadyStatus" class="status-badge">Not Ready</div>
                        <div class="button-group">
                            <button id="player2ReadyBtn" class="btn btn-success">Set Ready</button>
                            <button id="player2UnreadyBtn" class="btn btn-danger">Set Not Ready</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="debug-section">
                <h2>Game State Monitoring</h2>
                <div class="state-display">
                    <div class="state-row">
                        <label>Game Active:</label>
                        <span id="gameActive">-</span>
                    </div>
                    <div class="state-row">
                        <label>Countdown:</label>
                        <span id="countdownValue">-</span>
                    </div>
                    <div class="state-row">
                        <label>Current Task:</label>
                        <span id="currentTask">-</span>
                    </div>
                    <div class="state-row">
                        <label>Round Winner:</label>
                        <span id="roundWinner">-</span>
                    </div>
                    <div class="state-row">
                        <label>Timer Value:</label>
                        <span id="timerValue">-</span>
                    </div>
                    <div class="state-row">
                        <label>Winner:</label>
                        <span id="winner">-</span>
                    </div>
                </div>
            </div>

            <div class="debug-section">
                <h2>Player 1 Data</h2>
                <div class="player-data">
                    <div class="data-row">
                        <label>Score:</label>
                        <span id="p1Score">-</span>
                    </div>
                    <div class="data-row">
                        <label>Last Prediction:</label>
                        <span id="p1Prediction">-</span>
                    </div>
                </div>
            </div>

            <div class="debug-section">
                <h2>Player 2 Data</h2>
                <div class="player-data">
                    <div class="data-row">
                        <label>Score:</label>
                        <span id="p2Score">-</span>
                    </div>
                    <div class="data-row">
                        <label>Last Prediction:</label>
                        <span id="p2Prediction">-</span>
                    </div>
                </div>
            </div>

            <div class="debug-section">
                <h2>Pose Simulator</h2>
                <div class="simulator">
                    <div class="input-group">
                        <select id="poseSelect">
                            <option value="">Select a pose...</option>
                            <option value="Bird">Bird</option>
                            <option value="Bull">Bull</option>
                            <option value="Crab">Crab</option>
                            <option value="Deer">Deer</option>
                            <option value="Dog">Dog</option>
                            <option value="Duck">Duck</option>
                            <option value="Elephant">Elephant</option>
                            <option value="Paper">Paper</option>
                            <option value="Rock">Rock</option>
                            <option value="Scissor">Scissor</option>
                        </select>
                        <input type="number" id="confidenceInput" min="0" max="1" step="0.1" value="0.9" placeholder="Conf">
                    </div>
                    <div class="button-group">
                        <button id="simulatePlayer1Btn" class="btn btn-info">Send to P1</button>
                        <button id="simulatePlayer2Btn" class="btn btn-info">Send to P2</button>
                    </div>
                </div>
            </div>

            <div id="debugLog" class="debug-log">
                <h3>Activity Log</h3>
                <div id="logContent"></div>
            </div>
        </div>
    </div>

    <script>
        class DebugConsole {
            constructor() {
                this.logMessages = [];
                this.lastUpdate = Date.now();
                this.updateCount = 0;
                this.refreshRate = 0;
                
                this.setupEventListeners();
                this.startMonitoring();
                this.calculateRates();
            }

            setupEventListeners() {
                document.getElementById('startGameBtn').addEventListener('click', () => this.startGame());
                document.getElementById('resetGameBtn').addEventListener('click', () => this.resetGame());
                document.getElementById('setTimerBtn').addEventListener('click', () => this.setTimer());
                document.getElementById('player1ReadyBtn').addEventListener('click', () => this.setPlayerReady('1', true));
                document.getElementById('player1UnreadyBtn').addEventListener('click', () => this.setPlayerReady('1', false));
                document.getElementById('player2ReadyBtn').addEventListener('click', () => this.setPlayerReady('2', true));
                document.getElementById('player2UnreadyBtn').addEventListener('click', () => this.setPlayerReady('2', false));
                document.getElementById('simulatePlayer1Btn').addEventListener('click', () => this.simulatePose('1'));
                document.getElementById('simulatePlayer2Btn').addEventListener('click', () => this.simulatePose('2'));
            }

            calculateRates() {
                setInterval(() => {
                    this.refreshRate = this.updateCount;
                    document.getElementById('refreshRate').textContent = this.refreshRate + ' Hz';
                    document.getElementById('sendingRate').textContent = this.refreshRate + ' Hz'; // Since polling matches refresh
                    this.updateCount = 0;
                }, 1000);
            }

            async startGame() {
                try {
                    const response = await fetch('/api/debug/game/start', { method: 'POST' });
                    const result = await response.json();
                    if (result.success) this.addLog('✓ Game/Countdown started');
                    else this.addLog('✗ ' + (result.error || 'Failed'));
                } catch (error) { this.addLog('✗ Error: ' + error.message); }
            }

            async resetGame() {
                try {
                    await fetch('/api/debug/game/reset', { method: 'POST' });
                    this.addLog('✓ Game reset');
                } catch (error) { this.addLog('✗ Error: ' + error.message); }
            }

            async setTimer() {
                const seconds = document.getElementById('timerInput').value;
                try {
                    await fetch('/api/debug/timer/set', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ seconds: parseInt(seconds) })
                    });
                    this.addLog(`✓ Game duration set to ${seconds}s`);
                } catch (error) { this.addLog('✗ Error: ' + error.message); }
            }

            async setPlayerReady(playerNum, ready) {
                try {
                    await fetch(`/api/debug/player/ready/${playerNum}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ready })
                    });
                    this.addLog(`✓ Player ${playerNum} ready: ${ready}`);
                } catch (error) { this.addLog('✗ Error: ' + error.message); }
            }

            async simulatePose(playerNum) {
                const pose = document.getElementById('poseSelect').value;
                const confidence = parseFloat(document.getElementById('confidenceInput').value);
                if (!pose) return this.addLog('✗ Select a pose');
                try {
                    const endpoint = `/api/player${playerNum}/pose`;
                    await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prediction: pose, confidence, cameraFrame: null })
                    });
                    this.addLog(`✓ Sim P${playerNum}: ${pose}`);
                } catch (error) { this.addLog('✗ Error: ' + error.message); }
            }

            async updateGameState() {
                try {
                    this.updateCount++;
                    const response = await fetch('/api/debug/state');
                    const state = await response.json();
                    
                    document.getElementById('gameActive').textContent = state.gameActive ? '✓ Yes' : '✗ No';
                    document.getElementById('countdownValue').textContent = state.countdown > 0 ? state.countdown : 'None';
                    document.getElementById('currentTask').textContent = state.currentTask ? state.currentTask.name : 'None';
                    document.getElementById('roundWinner').textContent = state.roundWinner || 'None';
                    document.getElementById('timerValue').textContent = state.timer + 's';
                    document.getElementById('winner').textContent = state.winner || 'None';
                    
                    document.getElementById('p1Rate').textContent = (state.msgRates?.player1 || 0) + ' msg/s';
                    document.getElementById('p2Rate').textContent = (state.msgRates?.player2 || 0) + ' msg/s';
                    document.getElementById('p1Inference').textContent = (state.player1.inferenceTime || 0).toFixed(1) + ' ms';
                    document.getElementById('p2Inference').textContent = (state.player2.inferenceTime || 0).toFixed(1) + ' ms';

                    document.getElementById('player1ReadyStatus').textContent = state.player1.ready ? '✓ Ready' : '✗ Not Ready';
                    document.getElementById('player1ReadyStatus').classList.toggle('ready', state.player1.ready);
                    document.getElementById('p1Score').textContent = state.player1.score;
                    document.getElementById('p1Prediction').textContent = state.player1.prediction || '-';
                    
                    document.getElementById('player2ReadyStatus').textContent = state.player2.ready ? '✓ Ready' : '✗ Not Ready';
                    document.getElementById('player2ReadyStatus').classList.toggle('ready', state.player2.ready);
                    document.getElementById('p2Score').textContent = state.player2.score;
                    document.getElementById('p2Prediction').textContent = state.player2.prediction || '-';
                } catch (error) { console.error('Error:', error); }
            }

            startMonitoring() {
                // Poll at 20 Hz for smooth debugging
                setInterval(() => this.updateGameState(), 50);
            }

            addLog(message) {
                const timestamp = new Date().toLocaleTimeString();
                this.logMessages.unshift(`[${timestamp}] ${message}`);
                if (this.logMessages.length > 20) this.logMessages.pop();
                document.getElementById('logContent').innerHTML = this.logMessages.map(msg => `<div class="log-entry">${msg}</div>`).join('');
            }
        }
        const debug = new DebugConsole();
    </script>
</body>
</html>
